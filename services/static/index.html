<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTG Control</title>
<style>
  * { box-sizing: border-box; }
  body { background:#111; color:#eee; font-family: system-ui, sans-serif; margin:0; padding:0 0 24px; }
  .container { max-width:600px; margin:0 auto; padding:0 16px; }
  .topbar { background:#1a1a1a; border-bottom:1px solid #333; padding:12px 16px; font-size:13px; color:#9fd; position:sticky; top:0; z-index:10; text-align:center; }
  h1 { font-size:20px; margin:20px 0 16px; text-align:center; }
  .panel { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:18px; margin-bottom:16px; }
  h2 { font-size:17px; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:10px; background:#333; color:#999; text-transform:uppercase; letter-spacing:0.5px; }
  .nowplaying { font-size:13px; color:#9fd; margin-bottom:14px; min-height:18px; }
  select, input[type=number], input[type=text] { width:100%; padding:10px; margin-bottom:10px; background:#222; color:#eee; border:1px solid #444; border-radius:6px; font-size:14px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
  .row select, .row input[type=number] { margin-bottom:0; }
  button { flex:1; min-width:70px; padding:12px 10px; border:none; border-radius:6px; background:#333; color:#eee; cursor:pointer; font-size:14px; }
  button:hover:not(:disabled) { background:#444; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  button.primary { background:#2a6; }
  button.primary:hover:not(:disabled) { background:#3b7; }
  button.danger { background:#a33; }
  button.danger:hover:not(:disabled) { background:#b44; }
  .status { font-size:12px; margin-top:8px; min-height:16px; }
  .status.ok { color:#8c8; }
  .status.err { color:#f77; }
  .note { font-size:12px; color:#999; margin-bottom:10px; }
  .vol-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .vol-row input[type=range] { flex:1; }
  .vol-row label { font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .coming-soon { color:#777; font-size:13px; font-style:italic; margin-bottom:10px; }
</style>
</head>
<body>
<div class="topbar" id="topbar">Loading network info...</div>
<div class="container">
<h1>DIY-VTG Control</h1>
<div id="panels"></div>

<div class="panel">
  <h2>CEC <span class="badge">not yet implemented</span></h2>
  <div class="coming-soon">Backend not built yet — buttons below will show an error until it is.</div>
  <div class="row">
    <button onclick="cecCommand('power_on')">Power On</button>
    <button onclick="cecCommand('power_off')">Power Off</button>
  </div>
  <div class="row">
    <button onclick="cecCommand('volume_up')">Vol +</button>
    <button onclick="cecCommand('volume_down')">Vol -</button>
    <button onclick="cecCommand('mute')">Mute</button>
  </div>
  <input type="text" id="cec-custom" placeholder="Custom CEC command string">
  <div class="row">
    <button class="primary" onclick="sendCecCustom()">Send custom command</button>
  </div>
  <div class="status" id="status-cec"></div>
</div>

<div class="panel">
  <h2>OSD</h2>
  <div class="row"><label><input type="checkbox" id="osd-enabled"> Enabled</label></div>
  <div class="row"><label><input type="checkbox" id="osd-ip"> Show IP addresses</label></div>
  <div class="row"><label><input type="checkbox" id="osd-url"> Show web UI URL</label></div>
  <div class="row"><label><input type="checkbox" id="osd-errors"> Show errors</label></div>
  <button class="primary" onclick="saveOsdConfig()">Save OSD settings</button>
  <div class="status" id="status-osd"></div>
</div>

<div class="panel">
  <h2>Errors / Debugging <span class="badge">future</span></h2>
  <div class="coming-soon">Centralized error/status log coming in a future update.</div>
</div>

</div>

<script>
const targets = [
  { id: "video", label: "Video" },
  { id: "image", label: "Images" },
  { id: "audio", label: "Audio Test" }
];

function render() {
  document.getElementById("panels").innerHTML = targets.map(t => `
    <div class="panel">
      <h2>${t.label}</h2>
      <div class="nowplaying" id="np-${t.id}">Loading status...</div>
      ${t.id === "image" ? `
        <div class="note">Video and Images share one output — playing either one replaces what's currently showing.</div>
        <select id="res-${t.id}" onchange="loadFiles('${t.id}')">
          <option value="1080p">1080p images</option>
          <option value="4k">4K images</option>
        </select>
      ` : ""}

      <select id="sel-${t.id}"></select>
      <div class="row">
        <button onclick="playSelected('${t.id}')">Play selected</button>
        <button onclick="loadFolder('${t.id}')">Play folder</button>
      </div>

      ${t.id === "image" ? `
        <div class="row">
          <input type="number" id="speed-${t.id}" value="5" min="1" step="1" placeholder="Seconds per image">
          <button onclick="applySpeed('${t.id}')">Set loop speed</button>
        </div>
      ` : ""}

      ${t.id !== "image" ? `
      <div class="vol-row">
        <label>🔊</label>
        <input type="range" id="vol-${t.id}" min="${t.id === 'video' ? 50 : 0}" max="100" value="100" oninput="onVolumeInput('${t.id}')">
        <label><input type="checkbox" id="mute-${t.id}" onchange="onMuteToggle('${t.id}')"> Mute</label>
      </div>
      ` : ""}

      <div class="row">
        <button class="primary" onclick="ctl('${t.id}','toggle')">⏯ Play/Pause</button>
        <button class="danger" onclick="ctl('${t.id}','stop')">⏹ Stop</button>
      </div>
      <div class="row">
        <button onclick="ctl('${t.id}','prev')">⏮ Prev</button>
        <button onclick="ctl('${t.id}','next')">⏭ Next</button>
      </div>

      <div class="status" id="status-${t.id}"></div>
    </div>
  `).join("");
}

function getResolution(id) {
  const sel = document.getElementById(`res-${id}`);
  return sel ? sel.value : null;
}

function setStatusMsg(id, text, ok) {
  const el = document.getElementById(`status-${id}`);
  el.textContent = text;
  el.className = "status " + (ok ? "ok" : "err");
}

async function loadFiles(id) {
  try {
    const qs = id === "image" ? `?resolution=${getResolution(id)}` : "";
    const res = await fetch(`/api/media/${id}${qs}`);
    const data = await res.json();
    const sel = document.getElementById(`sel-${id}`);
    sel.innerHTML = data.files.length
      ? data.files.map(f => `<option>${f}</option>`).join("")
      : "<option>(no files found)</option>";
  } catch (e) {
    setStatusMsg(id, "Could not list media files.", false);
  }
}

async function loadFolder(id) {
  const body = { mode: "folder" };
  if (id === "image") body.resolution = getResolution(id);
  try {
    const res = await fetch(`/api/load/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    setStatusMsg(id, data.success ? `Playing folder (${data.count} files).` : (data.message || "Load failed."), data.success);
  } catch (e) {
    setStatusMsg(id, "Load request failed.", false);
  }
}

async function playSelected(id) {
  const sel = document.getElementById(`sel-${id}`);
  const filename = sel.value;
  if (!filename) { setStatusMsg(id, "No file selected.", false); return; }
  const body = { mode: "single", filename };
  if (id === "image") body.resolution = getResolution(id);
  try {
    const res = await fetch(`/api/load/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    setStatusMsg(id, data.success ? `Playing: ${filename}` : (data.message || "Load failed."), data.success);
  } catch (e) {
    setStatusMsg(id, "Load request failed.", false);
  }
}

async function applySpeed(id) {
  const val = document.getElementById(`speed-${id}`).value;
  try {
    const res = await fetch(`/api/speed/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ seconds: val })
    });
    const data = await res.json();
    setStatusMsg(id, data.success ? `Loop speed set to ${val}s per image.` : (data.message || "Failed."), data.success);
  } catch (e) {
    setStatusMsg(id, "Speed request failed.", false);
  }
}

let volumeDebounce = {};
function onVolumeInput(id) {
  clearTimeout(volumeDebounce[id]);
  volumeDebounce[id] = setTimeout(() => setVolume(id), 150);
}

async function setVolume(id) {
  const level = document.getElementById(`vol-${id}`).value;
  try {
    const res = await fetch(`/api/volume/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ level: parseInt(level) })
    });
    const data = await res.json();
    if (!data.success) setStatusMsg(id, data.message || "Volume failed.", false);
  } catch (e) {
    setStatusMsg(id, "Volume request failed.", false);
  }
}

async function onMuteToggle(id) {
  const muted = document.getElementById(`mute-${id}`).checked;
  try {
    const res = await fetch(`/api/mute/${id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ muted })
    });
    const data = await res.json();
    if (!data.success) setStatusMsg(id, data.message || "Mute failed.", false);
  } catch (e) {
    setStatusMsg(id, "Mute request failed.", false);
  }
}

async function ctl(id, action) {
  try {
    const res = await fetch(`/api/control/${id}/${action}`, { method: "POST" });
    const data = await res.json();
    if (!data.success) {
      setStatusMsg(id, data.message || "Command failed.", false);
    } else {
      setStatusMsg(id, "", true);
    }
  } catch (e) {
    setStatusMsg(id, "Command request failed.", false);
  }
}

function fmt(t) {
  if (t === null || t === undefined) return "--:--";
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}

async function pollStatus() {
  for (const t of targets) {
    const el = document.getElementById(`np-${t.id}`);
    try {
      const res = await fetch(`/api/status/${t.id}`);
      const data = await res.json();
      if (!data.success) { el.textContent = "Player not responding."; continue; }
      const s = data.status;
      const muteBox = document.getElementById(`mute-${t.id}`);
      if (muteBox && document.activeElement !== muteBox) muteBox.checked = !!s.mute;
      if (!s.filename) { el.textContent = "Nothing loaded."; continue; }
      const state = s.pause ? "Paused" : "Playing";
      el.textContent = `${state} — ${s.filename} (${fmt(s["time-pos"])} / ${fmt(s.duration)})`;
    } catch (e) {
      el.textContent = "Status unavailable.";
    }
  }
}

async function pollNetwork() {
  try {
    const res = await fetch("/api/network");
    const data = await res.json();
    const parts = [];
    if (data.eth0) parts.push(`eth0: ${data.eth0}`);
    if (data.wlan0) parts.push(`wlan0: ${data.wlan0}`);
    document.getElementById("topbar").textContent = parts.length ? parts.join("   |   ") : "No network detected";
  } catch (e) {
    document.getElementById("topbar").textContent = "Network info unavailable";
  }
}

async function loadOsdConfig() {
  try {
    const res = await fetch("/api/osd/config");
    const data = await res.json();
    const c = data.config;
    document.getElementById("osd-enabled").checked = c.enabled;
    document.getElementById("osd-ip").checked = c.show_ip;
    document.getElementById("osd-url").checked = c.show_web_url;
    document.getElementById("osd-errors").checked = c.show_errors;
  } catch (e) {
    document.getElementById("status-osd").textContent = "Could not load OSD config.";
  }
}

async function saveOsdConfig() {
  const body = {
    enabled: document.getElementById("osd-enabled").checked,
    show_ip: document.getElementById("osd-ip").checked,
    show_web_url: document.getElementById("osd-url").checked,
    show_errors: document.getElementById("osd-errors").checked
  };
  try {
    const res = await fetch("/api/osd/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const el = document.getElementById("status-osd");
    el.textContent = data.success ? "OSD settings saved." : "Save failed.";
    el.className = "status " + (data.success ? "ok" : "err");
    if (data.success) setTimeout(() => { el.textContent = ""; }, 3000);
  } catch (e) {
    document.getElementById("status-osd").textContent = "Save request failed.";
  }
}

async function cecCommand(cmd) {
  try {
    const res = await fetch(`/api/cec/${cmd}`, { method: "POST" });
    const data = await res.json();
    setStatusMsg("cec", data.success ? "Command sent." : (data.message || "Command failed."), data.success);
  } catch (e) {
    setStatusMsg("cec", "CEC not yet implemented.", false);
  }
}

async function sendCecCustom() {
  const value = document.getElementById("cec-custom").value;
  if (!value) { setStatusMsg("cec", "Enter a command string first.", false); return; }
  try {
    const res = await fetch("/api/cec/custom", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ command: value })
    });
    const data = await res.json();
    setStatusMsg("cec", data.success ? "Custom command sent." : (data.message || "Command failed."), data.success);
  } catch (e) {
    setStatusMsg("cec", "CEC not yet implemented.", false);
  }
}

render();
targets.forEach(t => loadFiles(t.id));
pollStatus();
pollNetwork();
loadOsdConfig();
setInterval(pollStatus, 2000);
setInterval(pollNetwork, 10000);
</script>
</body>
</html>
